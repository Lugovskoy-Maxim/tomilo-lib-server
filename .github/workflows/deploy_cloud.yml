name: Deploy to cloud

on:
  push:
    branches: [cloud]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to home server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST_CLOUD }}
          username: ${{ secrets.VM_USERNAME_CLOUD }}
          key: ${{ secrets.VM_SSH_KEY_CLOUD }}
          port: ${{ secrets.VM_SSH_PORT_CLOUD || 22 }}
          script: |
            bash -s << 'EOF'
            set -e  # прерывать скрипт при любой ошибке

            echo "🚀 Deploying to cloud.ru server..."

            PROJECT_DIR="/home/${{ secrets.VM_USERNAME_CLOUD }}/tomilo-lib/tomilo-lib-server"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"
            echo "Current directory: $(pwd)"

            # ---- GitHub SSH key setup ----
            if [ -n "${{ secrets.VM_SSH_KEY_CLOUD }}" ]; then
              mkdir -p ~/.ssh
              echo "${{ secrets.VM_SSH_KEY_CLOUD }}" > ~/.ssh/github_key
              chmod 600 ~/.ssh/github_key
              ssh-keyscan github.com >> ~/.ssh/known_hosts
              git config --global core.sshCommand "ssh -i ~/.ssh/github_key -o StrictHostKeyChecking=no"
            fi

            # ---- Git clone/update ----
            if [ ! -d .git ]; then
              echo "Cloning repository for the first time..."
              if [ -n "${{ secrets.VM_SSH_KEY_CLOUD }}" ]; then
                git clone git@github.com:${{ github.repository }}.git .
              else
                git clone https://github.com/${{ github.repository }}.git .
              fi
            else
              echo "Updating existing repository..."
              git fetch origin
              git reset --hard origin/cloud
            fi

            # ---- Node.js via nvm ----
            echo "🔧 Setting up Node.js 22..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"

            if ! command -v nvm &> /dev/null; then
              echo "Installing nvm..."
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.3/install.sh | bash
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
              [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            fi

            if ! nvm ls 22 &> /dev/null; then
              echo "Installing Node.js 22..."
              nvm install 22
            fi
            nvm use 22
            nvm alias default 22

            echo "Node.js version: $(node --version)"
            echo "npm version: $(npm --version)"

            # ---- Environment ----
            if [ -f .env.example ] && [ ! -f .env ]; then
              cp .env.example .env
              echo "✅ .env created from example"
            fi

            if [ -f .env ]; then
              sed -i 's/PORT=3000/PORT=3001/g' .env
              echo "✅ Updated PORT to 3001 in .env"
            fi

            # ---- Dependencies & Build ----
            echo "Installing dependencies and building..."
            rm -rf node_modules
            npm install
            if ! npm run build; then
              echo "❌ Build failed"
              exit 1
            fi

            # ---- Docker ----
            echo "🐳 Ensuring Docker daemon is running..."
            if ! docker info &>/dev/null; then
              echo "Docker not responding, attempting to start..."
              sudo systemctl start docker 2>/dev/null || sudo service docker start 2>/dev/null || true
              for i in $(seq 1 30); do
                if docker info &>/dev/null; then
                  echo "✅ Docker is ready"
                  break
                fi
                if [ "$i" -eq 30 ]; then
                  echo "❌ Docker failed to start"
                  exit 1
                fi
                sleep 1
              done
            else
              echo "✅ Docker is already running"
            fi

            # Clean up old MongoDB container
            echo "🛑 Stopping existing MongoDB containers..."
            docker stop mongo 2>/dev/null || true
            docker rm mongo 2>/dev/null || true
            docker ps -q --filter "publish=27017" | xargs -r docker stop
            docker ps -q --filter "publish=27017" | xargs -r docker rm

            # Prepare docker-compose.yml
            echo "🔍 Checking for docker-compose.yml..."
            if [ ! -f docker-compose.yml ]; then
              if [ -f docker-compose.yml.example ]; then
                cp docker-compose.yml.example docker-compose.yml
                echo "✅ docker-compose.yml created from template"
              else
                echo "❌ Error: docker-compose.yml.example not found!"
                exit 1
              fi
            else
              echo "✅ docker-compose.yml already exists, skipping copy."
            fi

            # Remove obsolete 'version' field to avoid warnings
            sed -i '/^version:/d' docker-compose.yml 2>/dev/null || true

            # Choose compose command
            if command -v docker-compose &> /dev/null; then
              COMPOSE_CMD="docker-compose"
              echo "Using docker-compose (legacy)"
            elif docker compose version &> /dev/null; then
              COMPOSE_CMD="docker compose"
              echo "Using docker compose (plugin)"
            else
              echo "❌ Error: Docker Compose not installed!"
              exit 1
            fi

            $COMPOSE_CMD down
            echo "🐳 Starting MongoDB container..."
            $COMPOSE_CMD up -d --remove-orphans mongo

            echo "📊 MongoDB container status:"
            $COMPOSE_CMD ps mongo
            echo "⏳ Waiting for MongoDB to be ready..."
            sleep 10

            # Check MongoDB health (mongo 4.4)
            $COMPOSE_CMD exec -T mongo mongo --eval "db.adminCommand('ping')" --quiet
            echo "✅ MongoDB is ready"

            # ---- PM2 application start ----
            # Get PM2 path dynamically (after nvm is loaded)
            PM2_PATH="$(which pm2)"
            if [ -z "$PM2_PATH" ]; then
              echo "❌ PM2 not found in PATH"
              exit 1
            fi
            echo "Using PM2 at: $PM2_PATH"

            $PM2_PATH stop tomilo-lib-server 2>/dev/null || true
            $PM2_PATH delete tomilo-lib-server 2>/dev/null || true
            $PM2_PATH start dist/main.js --name "tomilo-lib-server"
            $PM2_PATH save

            # Wait a moment for process to start
            sleep 3

            # Verify the process is online
            if $PM2_PATH list | grep -q "tomilo-lib-server.*online"; then
              echo "✅ Application is online"
            else
              echo "❌ Application failed to start. Showing logs:"
              $PM2_PATH logs tomilo-lib-server --lines 20 --nostream
              exit 1
            fi

            # Output process info
            echo "Node.js version used by PM2: $($PM2_PATH show tomilo-lib-server | grep 'Node.js Version' | awk '{print $3}')"
            echo "PM2 process list:"
            $PM2_PATH ls

            # Cleanup temporary SSH key
            if [ -f ~/.ssh/github_key ]; then
              rm -f ~/.ssh/github_key
            fi

            echo "✅ Successfully deployed MongoDB in Docker and app with PM2 on server."
            EOF
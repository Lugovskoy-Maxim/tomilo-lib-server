name: Deploy to cloud

on:
  push:
    branches: [cloud]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to home server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST_CLOUD }}
          username: ${{ secrets.VM_USERNAME_CLOUD }}
          key: ${{ secrets.VM_SSH_KEY_CLOUD }}
          port: ${{ secrets.VM_SSH_PORT_CLOUD || 22 }}
          script: |
            bash -s << 'EOF'
            set -e
            echo "🚀 Deploying to cloud.ru server..."
            PROJECT_DIR="/home/${{ secrets.VM_USERNAME_CLOUD }}/tomilo-lib/tomilo-lib-server"
            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            # Git update (опустим для краткости, оставьте свою логику)
            if [ ! -d .git ]; then
              git clone git@github.com:${{ github.repository }}.git .
            else
              git fetch origin && git reset --hard origin/cloud
            fi

            # NVM + Node 22
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            nvm use 22 || nvm install 22
            npm install
            npm run build

            # Docker MongoDB (как у вас)
            # ... (оставьте ваш код для Docker, он рабочий)

            # ==== ЗАПУСК PM2 (исправлено) ====
            PM2_PATH="$(which pm2)"   # динамический путь
            if [ -z "$PM2_PATH" ]; then
              echo "❌ PM2 not found"
              exit 1
            fi
            echo "Using PM2: $PM2_PATH"

            # Остановить старый процесс, если есть
            $PM2_PATH stop tomilo-lib-server 2>/dev/null || true
            $PM2_PATH delete tomilo-lib-server 2>/dev/null || true

            # Запустить новый
            $PM2_PATH start dist/main.js --name "tomilo-lib-server"
            $PM2_PATH save

            # Проверка
            sleep 3
            if $PM2_PATH list | grep -q "tomilo-lib-server.*online"; then
              echo "✅ App started successfully"
            else
              echo "❌ App failed to start"
              $PM2_PATH logs tomilo-lib-server --lines 20 --nostream
              exit 1
            fi

            $PM2_PATH list
            EOF